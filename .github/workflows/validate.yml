name: validate

# Authoritative contribution gate. Runs on every PR and on pushes to main.
# Make this a *required* status check in branch protection so PRs can't merge red.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        # gitleaks (below) scans the PR's commit range and needs each commit's parent, so the
        # default shallow fetch-depth:1 makes `<sha>^` unresolvable. Fetch full history.
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      # Authoritative schema/frontmatter/hooks validation (official tooling).
      # No --strict: it treats our intentional omitted `version` (rolling channel) as an
      # error. Real schema/frontmatter errors still fail; advisory warnings don't.
      - name: Official manifest validation (claude plugin validate)
        run: |
          npm install -g @anthropic-ai/claude-code
          for p in plugins/*/; do
            echo "::group::claude plugin validate $p"
            claude plugin validate "$p"
            echo "::endgroup::"
          done

      # Repo policy the official validator doesn't cover: required README+CHANGELOG,
      # scoped allowed-tools, danger-pattern scan, cross-marketplace allowlist, orphan dirs.
      - name: Marketplace & plugin policy
        run: node scripts/validate-marketplace.mjs

      - name: Skill-gate library unit tests
        run: node --test scripts/skill-gate-lib.test.mjs

      # Quality layer: every skill must have fresh eval artifacts meeting its
      # threshold. Deterministic, no LLM, no Anthropic auth (artifacts are
      # produced at author time by /skill-gate and committed).
      - name: Skill quality gate
        run: node scripts/check-skill-gate.mjs

      # OpenSpec structural validity (the tool enforcing its own rules) + funbox
      # hygiene gaps validate misses: TBD/placeholder Purposes in living specs and
      # a fully-implemented change left un-archived. All self-scope — a PR with no
      # specs or active changes produces no findings, so OpenSpec is never forced
      # onto work that doesn't use it.
      - name: OpenSpec structural validation
        run: |
          npm install -g @fission-ai/openspec@1.4.1
          openspec validate --strict --all

      - name: OpenSpec hygiene library unit tests
        run: node --test scripts/openspec-hygiene-lib.test.mjs

      - name: OpenSpec hygiene gate
        run: node scripts/check-openspec-hygiene.mjs

      - name: Shell script syntax (bash -n)
        run: |
          set -euo pipefail
          found=$(find plugins -name '*.sh' -print0 | tr '\0' '\n' | sed '/^$/d' || true)
          if [ -n "$found" ]; then
            find plugins -name '*.sh' -print0 | xargs -0 -n1 bash -n
          fi

      # Use the runner's pre-installed shellcheck — avoids a third-party action pinned to a
      # moving @master ref (supply-chain hygiene).
      - name: ShellCheck
        run: find plugins -name '*.sh' -print0 | xargs -0 -r shellcheck

      - name: PowerShell syntax
        shell: pwsh
        run: |
          $fail = $false
          Get-ChildItem -Recurse plugins -Filter *.ps1 | ForEach-Object {
            $errs = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$errs) | Out-Null
            if ($errs) { $fail = $true; Write-Error "Parse errors in $($_.FullName): $($errs -join '; ')" }
          }
          if ($fail) { exit 1 }

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
